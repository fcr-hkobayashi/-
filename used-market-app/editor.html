<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>アプリ編集 | みらいや査定</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1b2637;
        --muted: #51617a;
        --line: #d9e0ea;
        --panel: #ffffff;
        --input: #ffffff;
        --brand: #1c3563;
        --accent: #2e5aa8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #f3f5f8;
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", Meiryo, sans-serif;
      }
      main { width: min(1280px, 100%); margin: 0 auto; padding: 24px; }
      header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
      h1 { margin: 0; font-size: 26px; color: var(--brand); }
      a { color: var(--accent); font-weight: 700; text-decoration: underline; text-underline-offset: 3px; }
      .panel {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        overflow: hidden;
        box-shadow: 0 1px 2px rgba(20, 32, 54, 0.06), 0 8px 24px rgba(20, 32, 54, 0.07);
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px;
        border-bottom: 1px solid var(--line);
        background: #f7f9fc;
      }
      select, button {
        min-height: 40px;
        border-radius: 10px;
        border: 1px solid #c2cede;
        background: var(--input);
        color: var(--ink);
        font: inherit;
      }
      select { padding: 0 10px; }
      select:focus, button:focus-visible {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(46, 90, 168, 0.25);
      }
      button { padding: 0 14px; cursor: pointer; font-weight: 700; color: var(--brand); }
      button:hover { background: #eef3fa; }
      button.primary { border: 0; background: var(--brand); color: white; }
      button.primary:hover { background: #16294d; }
      textarea {
        width: 100%;
        min-height: calc(100vh - 180px);
        display: block;
        padding: 16px;
        border: 0;
        background: #ffffff;
        color: #1b2637;
        font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        resize: vertical;
      }
      textarea:focus { outline: none; }
      #status { margin-left: auto; color: var(--muted); font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>アプリ編集</h1>
        <nav>
          <a href="/">アプリへ戻る</a>
          &nbsp;/&nbsp;
          <a id="logoutLink" href="/logout">ログアウト</a>
        </nav>
      </header>
      <section class="panel">
        <div class="toolbar">
          <select id="fileSelect"></select>
          <button id="reloadBtn" type="button">再読み込み</button>
          <button id="saveBtn" class="primary" type="button">保存</button>
          <span id="status">読み込み中</span>
        </div>
        <textarea id="editor" spellcheck="false"></textarea>
      </section>
    </main>
    <script>
      const fileSelect = document.querySelector("#fileSelect");
      const editor = document.querySelector("#editor");
      const statusEl = document.querySelector("#status");
      const logoutLink = document.querySelector("#logoutLink");
      const setStatus = (text) => { statusEl.textContent = text; };

      async function loadUser() {
        const response = await fetch("/api/me");
        if (!response.ok) return;
        const data = await response.json();
        if (data.user?.username === "public-editor") logoutLink.remove();
      }

      async function loadFiles() {
        const response = await fetch("/api/files");
        if (!response.ok) throw new Error("ファイル一覧を取得できません");
        const files = await response.json();
        fileSelect.innerHTML = files.map((name) => `<option value="${name}">${name}</option>`).join("");
        await loadFile();
      }

      async function loadFile() {
        setStatus("読み込み中");
        const response = await fetch(`/api/file?name=${encodeURIComponent(fileSelect.value)}`);
        if (!response.ok) throw new Error("ファイルを読み込めません");
        const data = await response.json();
        editor.value = data.content;
        setStatus("読み込み完了");
      }

      async function saveFile() {
        setStatus("保存中");
        const response = await fetch("/api/file", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: fileSelect.value, content: editor.value }),
        });
        if (!response.ok) throw new Error("保存できません");
        setStatus("保存しました");
      }

      fileSelect.addEventListener("change", loadFile);
      document.querySelector("#reloadBtn").addEventListener("click", loadFile);
      document.querySelector("#saveBtn").addEventListener("click", saveFile);
      loadUser();
      loadFiles().catch((error) => setStatus(error.message));
    </script>
  </body>
</html>
