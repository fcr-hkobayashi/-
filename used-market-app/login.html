<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ログイン | みらいや査定</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #edf4ff;
        --muted: #9fb1cc;
        --line: #28476d;
        --panel: #10233d;
        --input: #0a192d;
        --brand: #4f8cff;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 16% 0%, rgba(79, 140, 255, 0.24), transparent 34rem),
          linear-gradient(180deg, #0b1b31 0%, #071426 56%, #050d19 100%);
        color: var(--ink);
        font-family: Inter, "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", Meiryo, sans-serif;
      }
      main {
        width: min(420px, calc(100% - 32px));
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(16, 35, 61, 0.94);
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.34);
      }
      h1 { margin: 0 0 8px; font-size: 32px; }
      p { margin: 0 0 22px; color: var(--muted); }
      label { display: grid; gap: 7px; margin-bottom: 14px; color: var(--muted); font-weight: 800; }
      input {
        min-height: 46px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--input);
        color: var(--ink);
        font: inherit;
      }
      button {
        width: 100%;
        min-height: 46px;
        border: 0;
        border-radius: 8px;
        background: var(--brand);
        color: white;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }
      .error { display: none; color: #ffb4b4; margin-bottom: 14px; }
      body:has(input[name="error"]) .error { display: block; }
    </style>
  </head>
  <body>
    <main>
      <h1>みらいや査定</h1>
      <p>IDとパスワードを入力してください。</p>
      <p class="error">ログイン情報が違います。</p>
      <form method="post" action="/login">
        <label>
          ID
          <input name="username" autocomplete="username" required />
        </label>
        <label>
          パスワード
          <input name="password" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit">ログイン</button>
      </form>
      <script>
        if (new URLSearchParams(location.search).has("error")) {
          document.querySelector(".error").style.display = "block";
        }
      </script>
    </main>
  </body>
</html>
