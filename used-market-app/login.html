<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ログイン | みらいや査定</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1b2637;
        --muted: #51617a;
        --line: #d9e0ea;
        --panel: #ffffff;
        --input: #ffffff;
        --brand: #1c3563;
        --accent: #2e5aa8;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f3f5f8;
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", Meiryo, sans-serif;
      }
      main {
        width: min(420px, calc(100% - 32px));
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        box-shadow: 0 1px 2px rgba(20, 32, 54, 0.06), 0 12px 32px rgba(20, 32, 54, 0.1);
      }
      h1 { margin: 0 0 8px; font-size: 28px; color: var(--brand); }
      p { margin: 0 0 22px; color: var(--muted); }
      label { display: grid; gap: 7px; margin-bottom: 14px; color: var(--muted); font-weight: 700; font-size: 13px; }
      input {
        min-height: 46px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--input);
        color: var(--ink);
        font: inherit;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(46, 90, 168, 0.25);
      }
      button {
        width: 100%;
        min-height: 46px;
        border: 0;
        border-radius: 10px;
        background: var(--brand);
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover { background: #16294d; }
      .error { display: none; color: #a11f2e; font-weight: 700; margin-bottom: 14px; }
      body:has(input[name="error"]) .error { display: block; }
    </style>
  </head>
  <body>
    <main>
      <h1>みらいや査定</h1>
      <p>IDとパスワードを入力してください。</p>
      <p class="error">ログイン情報が違います。</p>
      <form method="post" action="/login">
        <label>
          ID
          <input name="username" autocomplete="username" required />
        </label>
        <label>
          パスワード
          <input name="password" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit">ログイン</button>
      </form>
      <script>
        if (new URLSearchParams(location.search).has("error")) {
          document.querySelector(".error").style.display = "block";
        }
      </script>
    </main>
  </body>
</html>
